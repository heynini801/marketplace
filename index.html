<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Moment5 — Leather Journal & Stationery</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f3f0;
      --surface:   #ffffff;
      --border:    #e2ddd8;
      --text:      #2a2825;
      --muted:     #8a8480;
      --accent:    #6b5e4e;
      --tag-bg:    #ede9e4;
      --hover-shadow: 0 12px 40px rgba(42,40,37,.10);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 60px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 10;
    }

    .logo-wrap { display: flex; flex-direction: column; gap: 2px; }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--text);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    .logo-sub {
      font-size: 8.5px;
      letter-spacing: 0.32em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── HEADER RIGHT: nav + enter button ── */
    .header-right {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    nav { display: flex; gap: 36px; }

    nav a {
      font-size: 11px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }

    nav a:hover { color: var(--text); }

    /* ── ENTER PRODUCT BUTTON ── */
    .btn-enter {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 10px 20px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: all .2s;
      white-space: nowrap;
    }

    .btn-enter:hover {
      background: transparent;
      color: var(--accent);
    }

    /* ── HERO ── */
    .hero {
      padding: 80px 60px 60px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 680px;
    }

    .hero-label {
      font-size: 9px;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(36px, 5vw, 58px);
      line-height: 1.18;
      color: var(--text);
    }

    .hero p {
      font-size: 13px;
      line-height: 1.85;
      color: var(--muted);
      max-width: 460px;
      font-weight: 300;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      padding: 0 60px 40px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── GRID ── */
    .grid-section { padding: 0 60px 100px; }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 28px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow .3s, transform .3s;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp .55s forwards;
    }

    .card:hover {
      box-shadow: var(--hover-shadow);
      transform: translateY(-3px);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: .05s; }
    .card:nth-child(2) { animation-delay: .10s; }
    .card:nth-child(3) { animation-delay: .15s; }
    .card:nth-child(4) { animation-delay: .20s; }
    .card:nth-child(5) { animation-delay: .25s; }
    .card:nth-child(6) { animation-delay: .30s; }
    .card:nth-child(7) { animation-delay: .35s; }
    .card:nth-child(8) { animation-delay: .40s; }
    .card:nth-child(9) { animation-delay: .45s; }

    /* image area */
    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: var(--tag-bg);
      position: relative;
      overflow: hidden;
    }

    /* product image */
    .card-img img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* badge */
    .badge {
      position: absolute;
      top: 14px; right: 14px;
      font-size: 8.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 1px;
      background: var(--accent);
      color: #fff;
    }

    /* card body */
    .card-body { padding: 20px 22px 22px; }

    .card-category {
      font-size: 9px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 7px;
    }

    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.75;
      font-weight: 300;
      margin-bottom: 18px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .price {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .price-note {
      font-size: 10px;
      color: var(--muted);
      font-weight: 300;
    }

    .btn-add {
      font-family: 'Montserrat', sans-serif;
      font-size: 9.5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 9px 16px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: 2px;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-add:hover {
      background: var(--accent);
      color: #fff;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--border);
      margin: 0 60px 48px;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 36px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    .footer-copy {
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      header, .hero, .filter-bar, .grid-section, .divider, footer {
        padding-left: 22px;
        padding-right: 22px;
      }
      .product-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 18px; }
      .btn-enter { display: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-wrap">
    <a class="logo" href="#">MOMENT<span>5</span></a>
    <span class="logo-sub">Leather Journals &amp; Stationery</span>
  </div>
  <div class="header-right">
    <nav>
      <a href="#">Shop</a>
      <a href="#">About</a>
      <a href="#">Care</a>
      <a href="#">Contact</a>
    </nav>
    <a class="btn-enter" href="add-product.html">Enter Product</a>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <span class="hero-label">New Collection</span>
  <h1>Crafted for<br>Quiet Moments</h1>
  <p>Handcrafted leather binders, refill papers, and accessories designed to make every written moment feel intentional.</p>
</section>

<!-- FILTER -->
<div class="filter-bar">
  <button class="filter-btn active" onclick="filterCards('all', this)">All</button>
  <button class="filter-btn" onclick="filterCards('journal', this)">Journals</button>
  <button class="filter-btn" onclick="filterCards('refill', this)">Refills</button>
  <button class="filter-btn" onclick="filterCards('accessory', this)">Accessories</button>
</div>

<div class="divider"></div>

<!-- GRID -->
<section class="grid-section">
  <div class="product-grid" id="productGrid"></div>
</section>

<!-- FOOTER -->
<footer>
  <span class="footer-logo">MOMENT5</span>
  <span class="footer-copy">© 2025 Moment5. All rights reserved.</span>
</footer>

<script>
  // ─────────────────────────────────────────────
  // PRODUCTS — loaded from Google Sheets (CSV)
  // Column order: category, name, sub, desc, price, badge, img
  // ─────────────────────────────────────────────
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vREdarqLp6sc0FHivUjBIB6-8_ow80WVO4j2yA1Hd1JYsMHKNN6ZZIOwDqBwlKKClrrNYlNK1VnjIqR/pub?output=csv';

  let products = [];
  let activeFilter = 'all';

  // Minimal CSV parser (handles quoted fields with commas/newlines)
  function parseCSV(text) {
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], next = text[i + 1];
      if (inQuotes) {
        if (ch === '"' && next === '"') { field += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { field += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { row.push(field.trim()); field = ''; }
        else if (ch === '\n' || (ch === '\r' && next === '\n')) {
          if (ch === '\r') i++;
          row.push(field.trim()); field = '';
          if (row.some(c => c !== '')) rows.push(row);
          row = [];
        } else { field += ch; }
      }
    }
    if (field.trim() || row.length) { row.push(field.trim()); if (row.some(c => c !== '')) rows.push(row); }
    return rows;
  }

  function renderGrid(filter = 'all') {
    activeFilter = filter;
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    products
      .filter(p => filter === 'all' || p.category === filter)
      .forEach((p, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.cat = p.category;
        card.style.animationDelay = `${0.05 + i * 0.06}s`;
        card.innerHTML = `
          <div class="card-img">
            <img src="${p.img}" alt="${p.name}" loading="lazy"/>
            ${p.badge ? `<span class="badge">${p.badge}</span>` : ''}
          </div>
          <div class="card-body">
            <div class="card-category">${p.category}</div>
            <div class="card-name">${p.name}</div>
            <div class="card-desc">${p.sub} — ${p.desc}</div>
            <div class="card-footer">
              <div>
                <div class="price">${p.price}</div>
                <div class="price-note">incl. VAT</div>
              </div>
              <button class="btn-add">Add to Cart</button>
            </div>
          </div>`;
        grid.appendChild(card);
      });
  }

  function filterCards(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(cat);
  }

  async function loadProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '<p style="color:var(--muted);font-size:12px;letter-spacing:.1em;padding:20px 0;">Loading…</p>';
    try {
      const res = await fetch(SHEET_CSV_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const rows = parseCSV(text);

      // First row = headers; map by name (case-insensitive)
      const headers = rows[0].map(h => h.toLowerCase());
      const col = key => headers.indexOf(key);

      products = rows.slice(1).map(r => ({
        category : (r[col('category')] || '').toLowerCase(),
        name     : r[col('name')]    || '',
        sub      : r[col('sub')]     || '',
        desc     : r[col('desc')]    || '',
        price    : r[col('price')]   || '',
        badge    : r[col('badge')]   || null,
        img      : r[col('img')]     || '',
      })).filter(p => p.name); // skip empty rows

      renderGrid(activeFilter);
    } catch (err) {
      grid.innerHTML = `<p style="color:var(--muted);font-size:12px;letter-spacing:.1em;padding:20px 0;">Could not load products. Please try again later.</p>`;
      console.error('Failed to load product sheet:', err);
    }
  }

  loadProducts();
</script>
</body>
</html>
